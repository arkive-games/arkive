name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write   # required for pushing to gh-pages
  pages: read
  id-token: write

env:
  VITE_CDN_BASE_URL: "https://cdn.tc-imba.com/"
  VITE_API_BASE_URL: "https://aion2.tc-imba.com/"
  VITE_DEFAULT_DATA_MODE: "dynamic"
  VITE_PUBLIC_BASE: "/aion2-interactive-map/"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: pnpm --filter aion2 build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/apps/aion2/dist
          publish_branch: gh-pages
