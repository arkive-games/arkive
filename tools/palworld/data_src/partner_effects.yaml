  ResistAdditionalEffect_Electrical: { en-US: "Shock Resistance" }
  ResistAdditionalEffect_Freeze: { en-US: "Freeze Resistance" }
  ResistAdditionalEffect_IvyCling: { en-US: "Ivy Cling Resistance" }
  ResistAdditionalEffect_Muddy: { en-US: "Muddy Resistance" }
