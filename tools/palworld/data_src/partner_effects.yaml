# Partner-skill effect-type labels.
#
# Shape: effects: { <EffectType>: { <tag>: label } }
# The emitter (encyclopedia.py) writes data-palworld/locales/<tag>/partnerEffects.json
# with the fallback  lang -> en-US -> raw enum.  Only effect types actually used by
# roster pals are emitted; unauthored types fall back to the raw enum string and are
# printed by the build for later review.
#
# Currently seeded with en-US labels only (readable in every language via fallback).
# Translate per language by adding more tags under an effect type, e.g.:
#   MaxInventoryWeight: { en-US: Carry Weight, ja-JP: 所持重量 }
#
# Ambiguous / uncertain effect types are intentionally left unauthored (raw enum) for
# review — see the build's "unauthored (raw enum)" report.
effects:
  # --- carrying / movement -------------------------------------------------
  MaxInventoryWeight: { en-US: Carry Weight Up }
  ItemWeightReduction: { en-US: Item Weight Reduction }
  MoveSpeed: { en-US: Move Speed Up }
  MoveSpeed_Grass: { en-US: "Move Speed Up (Grassland)" }
  MoveSpeed_Ground: { en-US: "Move Speed Up (Ground)" }
  MoveSpeed_Snow: { en-US: "Move Speed Up (Snow)" }
  ClimbMoveSpeedRate: { en-US: Climbing Speed Up }
  SwimSpeed: { en-US: Swim Speed Up }
  AirDash: { en-US: Air Dash }
  JumpPower_Increase: { en-US: Jump Power Up }
  JumpCount_Increase: { en-US: Extra Jump }
  LowGravity: { en-US: Low Gravity }
  FallDamageRate: { en-US: Fall Damage Reduction }

  # --- combat --------------------------------------------------------------
