  ReloadSpeedUp: { en-US: Reload Speed Up }
  LifeSteal: { en-US: Life Steal }
  RecoverHPOnHPThreshold: { en-US: Heal at Low HP }
  Regene_HP_Rate: { en-US: HP Regeneration }
  ShieldDamageCutRate: { en-US: Shield Damage Reduction }

