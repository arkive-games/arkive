# Wiki taxonomy: game enum -> URL slug + display labels. Order = display order.
quest:
  labels: { en: "Quests", zhCN: "任务" }
  groups:
    - slug: main
      types: [Hero]
      labels: { en: "Main quests", zhCN: "主线任务" }
    - slug: side
      types: [District]
      labels: { en: "Side quests", zhCN: "支线任务" }
    - slug: duty
      types: [DutyMission, DutyScroll]
      labels: { en: "Duty quests", zhCN: "使命任务" }
    - slug: exploration
      types: [Exploration]
      labels: { en: "Exploration", zhCN: "探索任务" }
    - slug: ascension
      types: [Ascension]
      labels: { en: "Ascension", zhCN: "飞升任务" }
    - slug: mastery
      types: [GatherCraftMastery, Daevagauge]
      labels: { en: "Mastery & misc", zhCN: "专精与其他" }
npc:
  labels: { en: "NPCs & Monsters", zhCN: "NPC与怪物" }
  groups:
    - slug: boss
      labels: { en: "Named & bosses", zhCN: "精英与首领" }
    - slug: monster
      labels: { en: "Monsters", zhCN: "怪物" }
    - slug: citizen
      labels: { en: "NPCs", zhCN: "NPC" }
item:
  labels: { en: "Items", zhCN: "物品" }
  groups:
    - slug: equipment
      types: [Equip]
      labels: { en: "Equipment", zhCN: "装备" }
    - slug: usable
      types: [Usable]
      labels: { en: "Consumables & usables", zhCN: "消耗与可用品" }
    - slug: material
      types: [Misc]
      labels: { en: "Materials & misc", zhCN: "材料与杂项" }
    - slug: currency
      types: [Currency]
      labels: { en: "Currency", zhCN: "货币" }
