# Wiki taxonomy: game enum -> URL slug + display labels. Order = display order.
quest:
  labels: { en: "Quests", zhCN: "任务", ko: "퀘스트" }
  groups:
    - slug: main
      types: [Hero]
      labels: { en: "Main quests", zhCN: "主线任务", ko: "메인 퀘스트" }
    - slug: side
      types: [District]
      labels: { en: "Side quests", zhCN: "支线任务", ko: "서브 퀘스트" }
    - slug: duty
      types: [DutyMission, DutyScroll]
      labels: { en: "Duty quests", zhCN: "使命任务", ko: "사명 퀘스트" }
    - slug: exploration
      types: [Exploration]
      labels: { en: "Exploration", zhCN: "探索任务", ko: "탐험 퀘스트" }
    - slug: ascension
      types: [Ascension]
      labels: { en: "Ascension", zhCN: "飞升任务", ko: "승천 퀘스트" }
    - slug: mastery
      types: [GatherCraftMastery, Daevagauge]
      labels: { en: "Mastery & misc", zhCN: "专精与其他", ko: "숙련 & 기타" }
npc:
  labels: { en: "NPCs & Monsters", zhCN: "NPC与怪物", ko: "NPC & 몬스터" }
  groups:
    - slug: boss
      labels: { en: "Named & bosses", zhCN: "精英与首领", ko: "네임드 & 보스" }
    - slug: monster
      labels: { en: "Monsters", zhCN: "怪物", ko: "몬스터" }
    - slug: citizen
      labels: { en: "NPCs", zhCN: "NPC", ko: "NPC" }
item:
  labels: { en: "Items", zhCN: "物品", ko: "아이템" }
  groups:
    - slug: equipment
      types: [Equip]
      labels: { en: "Equipment", zhCN: "装备", ko: "장비" }
    - slug: usable
      types: [Usable]
      labels: { en: "Consumables & usables", zhCN: "消耗与可用品", ko: "소모품 & 사용 아이템" }
    - slug: material
      types: [Misc]
      labels: { en: "Materials & misc", zhCN: "材料与杂项", ko: "재료 & 기타" }
    - slug: currency
      types: [Currency]
      labels: { en: "Currency", zhCN: "货币", ko: "화폐" }
