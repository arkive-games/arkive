# Partner-skill effect-type + target labels, localized to all 17 UI languages.
#
# The emitter (encyclopedia.py) writes data-palworld/locales/<tag>/partnerEffects.json
# and partnerTargets.json. Label resolution per effect type:
#   1. FAMILY effects (elements / status ailments / work suitability) are COMPOSED at
#      emit time from the game's own localized term (element/work from enums,
#      ailment from ADDITIONAL_EFFECT_*) inserted into a `connectors:` template.
#      These are NOT listed under `effects:` below — they need no hand translation.
#   2. STANDALONE effects fall back to the hand-authored label under `effects:`.
#   3. Anything still missing falls back  tag -> regional sibling -> en-US -> raw enum.
#
# es-MX is intentionally omitted throughout (falls back to es-ES via _LANG_BASE).
# zh-CN / zh-TW are authored separately (simplified vs traditional script).

# --- connector templates ({name} = localized game term) ----------------------
# resist:            ElementResist_<E> + ResistAdditionalEffect_<S>
# inflict:           AdditionalEffect_<S>
# damageVs:          DamageRateIfDefender_<S>   (bonus damage to afflicted foes)
# captureVs:         CaptureLevelUpIfTarget_<S> (capture rate vs afflicted foes)
# elementDropUp:     ElementAddItemDrop_<E>
# elementWeakDamage: ElementBoostWeakness_<E>
# elementAttackUp:   ElementBoost_<E>
# elementAttack:     Element<E>                 (mount changes attack element)
# workAptitude:      WorkSuitabilityAddRank_<W>
