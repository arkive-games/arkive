introModal:
  version: "버전"
  title: "AION2 인터랙티브 지도에 오신 것을 환영합니다"
  body: |-
    이 웹사이트는 **苏烟攻略组 (Suyn AION2 Team)** 이 제작·운영합니다. 이 사이트는 **언제나 무료**로 유지될 것을 약속하며, 모든 일상 운영은 오로지 **자발적인 후원**으로 이루어집니다. 어떤 플랫폼(셴위, 타오바오, 틱톡 등)에서도 이 웹사이트를 판매·거래하거나 요금을 부과하지 않습니다. 사기에 주의하세요! 돈을 지불하고 이 웹사이트를 얻었다면 **환불**을 요청하고 판매자를 신고해 주세요. 저희 콘텐츠를 사칭한 가짜 버전을 발견하시면 **신고**로 도와주세요 — 감사합니다!

    사이트 개발자(**tc-imba**)는 오픈소스 커뮤니티의 확고한 지지자이자 기여자입니다. 이 웹사이트의 모든 코드와 리소스는 **GNU GPL 라이선스**로 공개되어 있습니다.

    개인 또는 단체가 **GPL 라이선스를 위반**하여 이 사이트의 코드나 리소스를 어떤 형태(무료 또는 유료)로든 재배포할 경우, **법적 책임을 물을 모든 권리를 보유**합니다.

    ### 소통 & 문의

    - **Aion 2 토론 Discord:** https://discord.gg/cqn9sKbWPU
    - **버그 제보 & 마커 공유**: Discord로 연락해 주세요
    - **광고 문의**: Discord로 연락해 주세요

    ### 지도가 로드되지 않을 때

    서버 부하가 높기 때문일 수 있습니다.
    우측 상단의 **온라인 모드(구름 아이콘)** 를 **오프라인 모드**로 전환할 수 있으며, 오프라인 데이터 업데이트는 다소 늦어질 수 있습니다.

    ### 팀 멤버

    **苏烟、双酿(tc-imba)、物语、阡陌夕晨、小海、言本卿、粥棵儿、落花千树、Marry、焦糖云朵大麦茶、煎饺**

    ### 후원자 여러분께 특별히 감사드립니다

    **笛声青案梦长安、不知水玄月、次不次薯条ono、饭特稀、澜芳华、阿姐收手吧、魔1–汐见琴音、11111、地对地导弹**

  hint: |-
    게임 공략 웹사이트를 운영하는 데에는 막대한 시간과 노력이 필요합니다. 저희를 응원하고 싶으시다면 아래의 Alipay QR 코드로 후원하실 수 있습니다 — 여러분의 마음이 이 프로젝트를 계속 나아가게 합니다 ❤


